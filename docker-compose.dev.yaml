
# This is only for the dev enviroment

services:
  socian-postgres:
    # ref: https://hub.docker.com/_/postgres
    image: postgres:17-alpine # 17.0
    container_name: socian-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: socian-local-pwd
      POSTGRES_USER: socian-local
      POSTGRES_DB: socian-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - socian-network
  socian-redis:
    # ref: https://hub.docker.com/_/redis
    image: redis:7-alpine # 7.4.0
    container_name: socian-redis
    restart: always
    ports:
      - 6379:6379
    networks:
      - socian-network
  socian-pg-admin:
    # ref: https://hub.docker.com/r/dpage/pgadmin4/tags
    image: dpage/pgadmin4:latest
    container_name: socian-pg-admin
    restart: always
    ports:
      - 8081:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - socian-network
  socian-redisinsight:
    # ref: https://hub.docker.com/r/redis/redisinsight
    image: redis/redisinsight:latest
    container_name: socian-redisinsight
    links:
      - socian-redis
    ports:
      - '5540:5540'
    volumes:
      - redisinsight:/data
    networks:
      - socian-network
    restart: always

volumes:
  redisinsight:
  postgres-volume:
    external: false

networks:
  socian-network:
    external: false
